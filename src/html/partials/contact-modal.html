    <div id="contact-modal" class="contact-modal" aria-hidden="true">
        <div class="contact-modal-overlay" data-contact-close="true"></div>
        <div class="contact-modal-card" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
            <button class="button contact-modal-close" type="button" aria-label="Close contact form" data-contact-close="true">&times;</button>
            <div class="contact-modal-body">
                <div class="pricing-header text-center">
                    <h2 id="contact-modal-title" class="section-title mt-0">Let's Talk About Your Project</h2>
                    <p class="section-paragraph mb-0">Tell us what you need, and we will get back to you quickly with the right solution.</p>
                </div>
                <form id="contact-form" action="/api/contact" method="post" class="pricing-table-main">
                    <label class="contact-honeypot" aria-hidden="true">
                        Leave this field empty
                        <input type="text" name="company_name" tabindex="-1" autocomplete="off">
                    </label>
                    <input type="hidden" name="opened_at" value="">
                    <div class="field-grouped mb-16">
                        <div class="control control-expanded">
                            <input class="input" type="text" name="name" placeholder="Name" required>
                        </div>
                        <div class="control control-expanded">
                            <input class="input" type="email" name="email" placeholder="E-mail" required>
                        </div>
                    </div>
                    <div class="field-grouped mb-16">
                        <div class="control control-expanded">
                            <input class="input" type="tel" name="phone" placeholder="Phone">
                        </div>
                        <div class="control control-expanded">
                            <input class="input" type="url" name="website" placeholder="Website (optional)">
                        </div>
                    </div>
                    <div class="mb-24">
                        <textarea class="textarea" name="message" rows="6" placeholder="Message" required></textarea>
                    </div>
                    <button id="contact-submit" class="button button-primary button-shadow button-block" type="submit">Send Message</button>
                    <p id="contact-form-status" class="text-sm mt-16 mb-0" role="status" aria-live="polite"></p>
                </form>
            </div>
        </div>
    </div>
